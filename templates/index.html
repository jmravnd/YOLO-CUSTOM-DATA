<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLO Object Detection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface-2: #1c1c27;
            --border: rgba(255,255,255,0.07);
            --border-hover: rgba(99,240,180,0.4);
            --accent: #63f0b4;
            --accent-dim: rgba(99,240,180,0.12);
            --accent-glow: rgba(99,240,180,0.25);
            --text: #eeeef2;
            --text-muted: #7a7a90;
            --text-dim: #45455a;
            --danger: #ff6b6b;
            --font-head: 'Syne', sans-serif;
            --font-mono: 'DM Mono', monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem 5rem;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(99,240,180,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,240,180,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 640px;
        }

        /* Header */
        .header {
            margin-bottom: 3rem;
            animation: fadeUp 0.6s ease both;
        }

        .header-tag {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-tag::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 1px;
            background: var(--accent);
        }

        h1 {
            font-family: var(--font-head);
            font-size: clamp(2rem, 6vw, 3.2rem);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        h1 span {
            color: var(--accent);
        }

        .header-sub {
            margin-top: 0.75rem;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* Upload card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            animation: fadeUp 0.6s ease 0.1s both;
        }

        .upload-zone {
            border: 1.5px dashed var(--text-dim);
            border-radius: 12px;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }

        .upload-zone:hover,
        .upload-zone.drag-over {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .upload-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, border-color 0.2s;
        }

        .upload-zone:hover .upload-icon {
            background: var(--accent-dim);
            border-color: var(--accent);
        }

        .upload-icon svg {
            width: 22px;
            height: 22px;
            stroke: var(--accent);
        }

        .upload-label {
            text-align: center;
        }

        .upload-label strong {
            font-family: var(--font-head);
            font-weight: 600;
            font-size: 15px;
            display: block;
            color: var(--text);
        }

        .upload-label span {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Preview */
        .preview-wrap {
            display: none;
            margin-top: 1.25rem;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
        }

        .preview-wrap img {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            display: block;
        }

        .preview-remove {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1;
            transition: background 0.2s, color 0.2s;
        }

        .preview-remove:hover {
            background: rgba(255,107,107,0.3);
            color: var(--danger);
        }

        /* File name bar */
        .file-meta {
            display: none;
            margin-top: 1rem;
            padding: 0.6rem 1rem;
            background: var(--surface-2);
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
            align-items: center;
            gap: 8px;
        }

        .file-meta .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        .file-meta .fname {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text);
        }

        /* Button */
        .btn {
            margin-top: 1.5rem;
            width: 100%;
            padding: 0.9rem 1.5rem;
            background: var(--accent);
            color: #050f09;
            border: none;
            border-radius: 10px;
            font-family: var(--font-head);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover { opacity: 0.88; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); opacity: 0.95; }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

        .btn svg { width: 16px; height: 16px; stroke: #050f09; }

        /* Results */
        .results {
            margin-top: 1.5rem;
            animation: fadeUp 0.5s ease both;
        }

        .result-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .result-image-wrap {
            position: relative;
        }

        .result-image-wrap img {
            width: 100%;
            height: auto;
            display: block;
        }

        .result-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(10,10,15,0.8) 0%, transparent 50%);
            pointer-events: none;
        }

        .result-body {
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .stat {
            background: var(--surface-2);
            border-radius: 10px;
            padding: 1rem 1.25rem;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .stat-value {
            font-family: var(--font-head);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            word-break: break-word;
        }

        .stat-value.accent { color: var(--accent); }

        /* Confidence bar */
        .conf-bar-wrap {
            margin-top: 6px;
            height: 3px;
            border-radius: 2px;
            background: var(--surface);
            overflow: hidden;
        }

        .conf-bar {
            height: 100%;
            border-radius: 2px;
            background: var(--accent);
            transition: width 0.6s ease;
        }

        .conf-bar.filled {
            width: var(--conf-width);
        }

        [data-conf-width] {
            --conf-width: attr(data-conf-width);
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Scan line animation on result image */
        .scan-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            opacity: 0.6;
            animation: scan 2s ease-in-out 0.3s forwards;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        @keyframes scan {
            0%   { top: 0%; opacity: 0.7; }
            90%  { top: 100%; opacity: 0.7; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body>

<div class="wrapper">

    <header class="header">
        <p class="header-tag">Computer Vision</p>
        <h1>Object<br><span>Detection</span></h1>
        <p class="header-sub">Upload an image and the YOLO model will identify objects with confidence scores in real time.</p>
    </header>

    <div class="card">
        <form action="/predict" method="post" enctype="multipart/form-data" id="detect-form">

            <div class="upload-zone" id="drop-zone">
                <input type="file" name="image" id="image-input" accept="image/*" required title="Upload an image file">
                <div class="upload-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </div>
                <div class="upload-label">
                    <strong>Drop image here</strong>
                    <span>or click to browse — JPG, PNG, WEBP</span>
                </div>
            </div>

            <div class="preview-wrap" id="preview-wrap">
                <img id="preview-img" src="" alt="Preview">
                <button type="button" class="preview-remove" id="remove-btn" title="Remove">×</button>
            </div>

            <div class="file-meta" id="file-meta">
                <span class="dot"></span>
                <span class="fname" id="file-name"></span>
            </div>

            <button type="submit" class="btn" id="submit-btn" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                Run Detection
            </button>
        </form>
    </div>

    {% if label %}
    <div class="results">
        <p class="result-label">Detection Result</p>
        <div class="result-card">
            <div class="result-image-wrap">
                <div class="scan-line"></div>
                <img src="{{ image }}" alt="Detected image">
                <div class="result-overlay"></div>
            </div>
            <div class="result-body">
                <div class="stat">
                    <div class="stat-label">Object</div>
                    <div class="stat-value accent">{{ label }}</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Confidence</div>
                    <div class="stat-value">{{ confidence }}</div>
                    <div class="conf-bar-wrap">
                        <div class="conf-bar filled" data-conf-width="{{ confidence }}"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% endif %}

</div>

<script>
    const input = document.getElementById('image-input');
    const previewWrap = document.getElementById('preview-wrap');
    const previewImg = document.getElementById('preview-img');
    const fileMeta = document.getElementById('file-meta');
    const fileName = document.getElementById('file-name');
    const submitBtn = document.getElementById('submit-btn');
    const removeBtn = document.getElementById('remove-btn');
    const dropZone = document.getElementById('drop-zone');

    function handleFile(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const url = URL.createObjectURL(file);
        previewImg.src = url;
        previewWrap.style.display = 'block';
        fileMeta.style.display = 'flex';
        fileName.textContent = file.name + '  ·  ' + (file.size / 1024).toFixed(0) + ' KB';
        submitBtn.disabled = false;
    }

    input.addEventListener('change', () => {
        if (input.files[0]) handleFile(input.files[0]);
    });

    removeBtn.addEventListener('click', () => {
        input.value = '';
        previewWrap.style.display = 'none';
        fileMeta.style.display = 'none';
        submitBtn.disabled = true;
        previewImg.src = '';
    });

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) {
            const dt = new DataTransfer();
            dt.items.add(file);
            input.files = dt.files;
            handleFile(file);
        }
    });

    document.getElementById('detect-form').addEventListener('submit', () => {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Detecting…';
    });
</script>

</body>
</html>
